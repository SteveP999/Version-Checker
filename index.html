<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song Review Room</title>
<style>
body {
  font-family: Arial, sans-serif;
  background:#0f1115;
  color:#fff;
  margin:0;
  padding:20px;
}
.container {
  max-width:1000px;
  margin:auto;
}
h1 {
  text-align:center;
}
.card {
  background:#1a1d24;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}
audio {
  width:100%;
  margin-top:10px;
}
textarea {
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:none;
}
button {
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.selected {
  background:#4caf50;
  color:white;
}
</style>
</head>
<body>
<div class="container">
<h1>Song Review Room</h1>

<div id="songs"></div>

<h2>Summary</h2>
<div id="summary"></div>
</div>

<script>

// 👉 PASTE YOUR DROPBOX LINKS HERE (use ?raw=1)
const versions = [
  {
    title: "Version 1",
    url: "https://www.dropbox.com/scl/fi/yqu7f43m4agxtuvkka0y6/Sky-V1.mp3?rlkey=hfu37me8bbkbu14vlvvwj28qd&st=cc9ney9c&dl=0?raw=1",
    notes: "",
    selected: false
  },
  {
    title: "Version 2",
    url: "https://www.dropbox.com/scl/fi/b0x0zjkxte6heh0w5cv1f/Sky-v2.mp3?rlkey=wiwiu4ysulhvfrnsq5y395hu2&st=a284zfiq&raw=1",
    notes: "",
    selected: false
  },
  {
    title: "Version 3",
    url: "https://www.dropbox.com/s/xxxxx/version3.mp3?raw=1",
    notes: "",
    selected: false
  }
];

function render() {
  const container = document.getElementById("songs");
  container.innerHTML = "";

  versions.forEach((v, i) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${v.title}</h3>
      <audio controls>
        <source src="${v.url}" type="audio/mpeg">
      </audio>
      <textarea placeholder="Writer notes..." oninput="saveNotes(${i}, this.value)">${v.notes}</textarea>
      <button class="${v.selected ? 'selected' : ''}" onclick="selectVersion(${i})">
        ${v.selected ? 'SELECTED' : 'Select This Version'}
      </button>
    `;

    container.appendChild(card);
  });

  updateSummary();
}

function saveNotes(i, value) {
  versions[i].notes = value;
  updateSummary();
}

function selectVersion(i) {
  versions.forEach(v => v.selected = false);
  versions[i].selected = true;
  render();
}

function updateSummary() {
  const summary = document.getElementById("summary");

  let text = "";
  const selected = versions.find(v => v.selected);

  if (selected) {
    text += `<p><strong>Selected:</strong> ${selected.title}</p>`;
  } else {
    text += `<p>No version selected yet.</p>`;
  }

  versions.forEach(v => {
    if (v.notes) {
      text += `<p><strong>${v.title}:</strong> ${v.notes}</p>`;
    }
  });

  summary.innerHTML = text;
}

render();

</script>
</body>
</html>
